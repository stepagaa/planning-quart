  <style>

    .detail-dt{font-size:.58rem;color:#475569;width:36px;text-align:center}

    .tab.active{background:#1d4ed8;border-color:#2563eb;color:#fff}

<body>
<div id="root"></div>
<script>
const {useState,useEffect,useCallback,createElement:h,Fragment}=React;

const ROULEMENT=[
  ["M","M","M","APM","APM","N","N"],
  ["RAH","RH","RH","RAH","RAH","M","M"],
  ["APM","APM","APM","N","N","RAH","RAH"],
  ["RAH","RH","RH","M","M","APM","APM"],
  ["N","N","N","RAH","RAH","E","E"],
  ["E/","RH","RH","RAH","RAH","RAH","RAH"],
];

function easterDate(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),hh=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4;
  const l=(32+2*e+2*i-hh-k)%7,mn=Math.floor((a+11*hh+22*l)/451);
  return new Date(y,Math.floor((hh+l-7*mn+114)/31)-1,((hh+l-7*mn+114)%31)+1);
}
function getFeries(y){
  const e=easterDate(y),aD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
  const f=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return new Set([y+'-01-01',y+'-05-01',y+'-05-08',y+'-07-14',y+'-08-15',y+'-11-01',y+'-11-11',y+'-12-25',f(aD(e,1)),f(aD(e,39)),f(aD(e,50))]);
}

const SHIFT={
  M:   {badge:"#2563eb",text:"#fff",   short:"M",  label:"Matin",      fs:"1rem"},
  APM: {badge:"#dc2626",text:"#fff",   short:"APM",label:"Après-midi", fs:".58rem"},
  N:   {badge:"#e2e8f0",text:"#1e293b",short:"N",  label:"Nuit",       fs:"1rem"},
  RAH: {badge:"#374151",text:"#fff",   short:"RAH",label:"Repos",      fs:".54rem"},
  RH:  {badge:"#1f2937",text:"#fff",   short:"RH", label:"W-E",        fs:".78rem"},
  E:   {badge:"#eab308",text:"#1e293b",short:"J",  label:"J",          fs:"1rem"},
  "E/":{badge:"#eab308",text:"#1e293b",short:"V",  label:"V",          fs:"1rem"},
};
const REPL={
  M:  {badge:"#2563eb",text:"#fff",   short:"M",  label:"Matin"},
  APM:{badge:"#dc2626",text:"#fff",   short:"APM",label:"APM"},
  N:  {badge:"#e2e8f0",text:"#1e293b",short:"N",  label:"Nuit"},
};
// Événements spéciaux (fond de case)
const EVENTS={
  formation:{bg:"#22c55e",label:"Formation",short:"F",  text:"#fff",col:"#fff"},
  bj:       {bg:"#7c2d12",label:"BJ",        short:"BJ", text:"#fdba74"},
  hp:       {bg:"#0c4a6e",label:"HP",        short:"HP", text:"#7dd3fc"},
  rs:       {bg:"#3b1f0a",label:"RS",        short:"RS", text:"#d4a574"},
};
// Absent badge: bleu ciel avec "CA"
const ABSENT_BADGE={bg:"#0891b2",col:"#fff",lbl:"CA",fs:".65rem"};
// ISC heures par quart et type de jour (dernière ligne du tableau)
// clé: shift (M/APM/N) + dayType (sem/sam/dim)
const ISC={
  M:  {sem:0.75, sam:2.7,  dim:3.375},
  APM:{sem:0.875,sam:3.2,  dim:4},
  N:  {sem:4,    sam:4.6,  dim:4.4},
  RAH:{sem:0,    sam:0,    dim:0},
  RH: {sem:0,    sam:0,    dim:0},
  E:  {sem:0,    sam:0,    dim:0},
  "E/":{sem:0,   sam:0,    dim:0},
};

function getDayType(d,feries){
  const k=dkey(d);
  if(feries.has(k))return'dim'; // JF = dimanche
  const dow=d.getDay();
  if(dow===0)return'dim';
  if(dow===6)return'sam';
  return'sem';
}

// Type de jour pour remplacement: sem→sam, sam→dim, dim→dim
function getDayTypeRepl(d,feries){
  const dt=getDayType(d,feries);
  if(dt==='sem')return'sam';
  return'dim'; // sam→dim, dim→dim
}

function calcISC(view,ov,allFeries){
  const last=new Date(view.y,view.m+1,0);
  let totalTh=0, totalRepl=0;
  const JLBL=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  for(let day=1;day<=last.getDate();day++){
    const d=new Date(view.y,view.m,day);
    const key=dkey(d);
    const o=ov[key];
    if(o&&o.absent)continue;
    const thShift=(o&&o.manShift)||getShift(d);
    const isc=ISC[thShift];
    if(!isc)continue;
    const dt=getDayType(d,allFeries);
    const hTh=isc[dt];
    if(hTh>0)totalTh+=hTh;
    // Remplacement: ISC du quart de remplacement avec dayType décalé
    if(o&&o.repl&&REPL[o.repl]){
      const replShift=o.repl;
      const iscR=ISC[replShift];
      if(iscR){
        const dtR=getDayTypeRepl(d,allFeries);
        const hR=iscR[dtR];
        if(hR>0)totalRepl+=hR;
      }
    }
  }
  const total=Math.round((totalTh+totalRepl)*100)/100;
  return{
    total,
    th:Math.round(totalTh*100)/100,
    repl:Math.round(totalRepl*100)/100,
  };
}

// Heures supplémentaires par quart théorique × quart effectué
// Colonnes: M, APM, N_J, N_V, N_RAH, N_RH
// Valeurs = TOTAL tableau - ISC tableau
const HS_TABLE={
  RAH:{M:7,    APM:9,    N_J:16,  N_V:16,  N_RAH:16,  N_RH:17},
  RH: {M:14,   APM:16,   N_J:23,  N_V:23,  N_RAH:23,  N_RH:25},
  E:  {M:1.38, APM:3,    N_J:12.5,N_V:12.5,N_RAH:12.5,N_RH:0},  // J
  "E/":{M:4,   APM:8,    N_J:16,  N_V:0,   N_RAH:0,   N_RH:17}, // V
};

// Détermine la colonne HS pour un remplacement nuit
function getNightCol(d,ov,feries){
  // Regarder le quart du jour suivant
  const next=addDays(d,1);
  const oNext=ov[dkey(next)];
  const nextShift=(oNext&&oNext.manShift)||getShift(next);
  if(nextShift==='E')return'N_J';
  if(nextShift==='E/')return'N_V';
  if(nextShift==='RAH')return'N_RAH';
  if(nextShift==='RH')return'N_RH';
  // Si pas de tableau pour ce suivant → N_RAH par défaut
  return'N_RAH';
}

// Nuit col: 1=soir seulement, 2=nuit complète sur JF, 3=fin de nuit seulement
function getNuitFerieCol(shift, prevShift){
  if(shift==='N'&&prevShift!=='N')return 1;  // 20h-00h seulement
  if(shift==='N'&&prevShift==='N')return 2;  // nuit complète
  if(shift!=='N'&&prevShift==='N')return 3;  // 00h-06h seulement
  return 0;
}

// HS tableau JF par quart et colonne nuit (valeurs = Total - ISC)
const HS_FERIE={
  M:   {normal:15.1875, premier_mai:21.9375},
  APM: {normal:18,      premier_mai:26},
  N1:  {normal:9,       premier_mai:13},   // nuit col.1
  N2:  {normal:22.5,    premier_mai:33.5}, // nuit col.2
  N3:  {normal:13.5,    premier_mai:19.5}, // nuit col.3
};

// Heures travaillées sur un JF : retourne {hsTh, hsFerie, isc, nuitCol}
function hsJourFerieDetail(d, ov, allFeries){
  const o=ov[dkey(d)];
  const shift=(o&&o.manShift)||getShift(d);
  const prev=addDays(d,-1);
  const oPrev=ov[dkey(prev)];
  const prevAbsent=oPrev&&oPrev.absent;
  const prevShift=(oPrev&&oPrev.manShift)||getShift(prev);
  // Si la veille est en nuit mais marquée absente, pas de fin de nuit → traiter comme pas de nuit
  const prevShiftEff=(prevShift==='N'&&prevAbsent)?'RAH':prevShift;
  const nuitCol=getNuitFerieCol(shift, prevShiftEff);
  const isPremierMai=dkey(d).endsWith('-05-01');

  // Heures théoriques travaillées (hsTh) — ce que hsJourFerie retournait avant
  let hsTh=0;
  if(shift==='RAH'||shift==='RH') hsTh=nuitCol===3?6:7;
  else if(shift==='M')  hsTh=6.75+(nuitCol===3?6:0);
  else if(shift==='APM')hsTh=8+(nuitCol===3?6:0);
  else if(shift==='N')  hsTh=4+(nuitCol===3?6:0);
  else hsTh=(nuitCol===3?6:0);

  // ISC théorique du jour
  const dayType=getDayType(d,allFeries);
  const iscVal=(ISC[shift]&&ISC[shift][dayType])||0;

  // HS tableau JF (déjà net des ISC)
  let hsFerie=0;
  if(shift==='RAH'||shift==='RH'){
    hsFerie=0; // RAH/RH : pas de HS JF
  } else {
    const col=shift==='M'?'M':shift==='APM'?'APM':nuitCol===1?'N1':nuitCol===2?'N2':nuitCol===3?'N3':null;
    if(col){
      const row=HS_FERIE[col];
      hsFerie=isPremierMai?row.premier_mai:row.normal;
    }
  }

  return {hsTh, hsFerie, isc:iscVal, nuitCol, isPremierMai, shift};
}

// Heures travaillées sur un JF pour le calcul HS global
function hsJourFerie(d, ov, allFeries){
  const detail=hsJourFerieDetail(d,ov,allFeries);
  return detail.hsTh;
}

function calcHS(view,ov,allFeries){
  const last=new Date(view.y,view.m+1,0);
  let total=0;
  for(let day=1;day<=last.getDate();day++){
    const d=new Date(view.y,view.m,day);
    const key=dkey(d);
    const o=ov[key];

    // Jour férié dans quart théorique (pas de remplacement, pas absent)
    if(allFeries.has(key)&&!(o&&o.repl)&&!(o&&o.absent)){
      const detail=hsJourFerieDetail(d,ov,allFeries);
      const h=detail.hsTh+detail.hsFerie;
      if(h>0){total+=h;continue;}
    }

    // Formation sur RAH → 10.5h HS
    if(o&&o.event==='formation'){
      const thShift=(o.manShift)||getShift(d);
      if(thShift==='RAH'){total+=10.5;} continue;
    }
    if(!o||!o.repl)continue; // HS uniquement sur remplacements
    const thShift=(o.manShift)||getShift(d);
    const hsRow=HS_TABLE[thShift];
    if(!hsRow)continue;
    const replShift=o.repl;
    let col;
    if(replShift==='M')col='M';
    else if(replShift==='APM')col='APM';
    else if(replShift==='N')col=getNightCol(d,ov,allFeries);
    else continue;
    const hs=hsRow[col]||0;
    if(hs>0)total+=hs;
  }
  return Math.round(total*100)/100;
}

function calcCA(view,ov){
  const DUREE={M:6.75,APM:8,N:10,RAH:0,RH:0,'E':0,'E/':0};
  const last=new Date(view.y,view.m+1,0);
  let total=0;
  for(let day=1;day<=last.getDate();day++){
    const d=new Date(view.y,view.m,day);
    const o=ov[dkey(d)];
    if(!o||!o.absent)continue;
    const shift=getShift(d);
    total+=(DUREE[shift]||0);
  }
  return Math.round(total*100)/100;
}

function calcAnnuel(year,ov){
  const allF=new Set([...getFeries(year-1),...getFeries(year),...getFeries(year+1)]);
  let isc={total:0,th:0,repl:0},hs=0,ca=0;
  const months=[];
  for(let m=0;m<12;m++){
    const v={y:year,m};
    const mi=calcISC(v,ov,allF);
    const mh=calcHS(v,ov,allF)||0;
    const mc=calcCA(v,ov);
    const tot=Math.round((mi.total+mh)*100)/100;
    months.push({m,isc:mi,hs:mh,ca:mc,total:tot});
    isc.total=Math.round((isc.total+mi.total)*100)/100;
    isc.th=Math.round((isc.th+mi.th)*100)/100;
    isc.repl=Math.round((isc.repl+mi.repl)*100)/100;
    hs=Math.round((hs+mh)*100)/100;
    ca=Math.round((ca+mc)*100)/100;
  }
  return{isc,hs,ca,months,total:Math.round((isc.total+hs)*100)/100};
}

const MOIS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const JOURS=["L","M","M","J","V","S","D"];
const REF=new Date(2025,11,26);

function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function dkey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getShift(d){const diff=Math.round((d-REF)/86400000),pos=((diff%42)+42)%42;return ROULEMENT[Math.floor(pos/7)][pos%7];}
function cyclePos(d){return((Math.round((d-REF)/86400000)%42)+42)%42;}
function isRahConvertible(d){const p=cyclePos(d);return p===38||p===39;}
function isJConvertible(d){const p=cyclePos(d);return p===33||p===34;}
function isVConvertible(d){const p=cyclePos(d);return p===35;}

function Modal({modal,ov,onSave,onClose}){
  const key=dkey(modal.date),ex=ov[key],raw=modal.shift,s=SHIFT[raw];
  const canToRah=isJConvertible(modal.date)||isVConvertible(modal.date)||isRahConvertible(modal.date);
  const canToJ=isRahConvertible(modal.date)||isVConvertible(modal.date);
  const canToV=isRahConvertible(modal.date)||isJConvertible(modal.date);
  const [absent,setAbsent]=useState((ex&&ex.absent)||false);
  const [event,setEvent]=useState((ex&&ex.event)||null);
  const [repl,setRepl]=useState((ex&&ex.repl)||null);
  const [manShift,setManShift]=useState((ex&&ex.manShift)||null);
  const [note,setNote]=useState((ex&&ex.note)||'');
  const [days,setDays]=useState(1); // durée pour absent/formation
  const dl=modal.date.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  const es=SHIFT[manShift||raw]||s;
  const tog=t=>setManShift(p=>p===t?null:t);
  // ISC de ce jour (quart théorique, CA=0)
  const modalFeries=new Set([...getFeries(modal.date.getFullYear()-1),...getFeries(modal.date.getFullYear()),...getFeries(modal.date.getFullYear()+1)]);
  const iscShift=absent?null:(manShift||raw);
  const iscVal=iscShift&&ISC[iscShift]?ISC[iscShift][getDayType(modal.date,modalFeries)]:0;
  // HS de ce jour si remplacement
  const hsVal=(()=>{
    // Formation sur RAH
    if(event==='formation'&&(manShift||raw)==='RAH')return 10.5;
    if(!repl)return 0;
    const thShift=manShift||raw;
    const hsRow=HS_TABLE[thShift];
    if(!hsRow)return 0;
    let col;
    if(repl==='M')col='M';
    else if(repl==='APM')col='APM';
    else if(repl==='N')col=getNightCol(modal.date,ex?{[dkey(modal.date)]:ex}:{},modalFeries);
    else return 0;
    return hsRow[col]||0;
  })();
  // HS jour férié théorique
  const isFerie=modalFeries.has(dkey(modal.date));
  const ferieDetail=isFerie&&!repl&&!absent?hsJourFerieDetail(modal.date,ov,modalFeries):null;
  const hsFerieVal=ferieDetail?ferieDetail.hsFerie:0;

  // ISC du remplacement
  const iscReplVal=(()=>{
    if(!repl||!REPL[repl])return 0;
    const iscR=ISC[repl];
    if(!iscR)return 0;
    return iscR[getDayTypeRepl(modal.date,modalFeries)];
  })();
  const showDays=absent||(event==='formation');
  const save=()=>{
    const data={};
    if(absent)data.absent=true;
    if(event)data.event=event;
    if(repl)data.repl=repl;
    if(manShift)data.manShift=manShift;
    if(note.trim())data.note=note.trim();
    onSave(Object.keys(data).length===0?null:data,showDays?days:1);
  };
  return h('div',{className:'mbg',onClick:onClose},
    h('div',{className:'mcard',onClick:e=>e.stopPropagation()},
      h('div',{className:'mhandle'}),
      h('div',{className:'mhead'},
        h('div',{className:'mbadge',style:{background:es.badge,color:es.text}},es.short),
        h('div',{style:{flex:1}},
          h('div',{className:'mdate'},dl),
          h('div',{className:'mshift'},es.label)
        ),
        h('div',{style:{flexShrink:0,display:'flex',flexDirection:'column',gap:'5px',justifyContent:'center'}},
          iscVal>0&&h('div',{style:{display:'flex',alignItems:'baseline',gap:'5px'}},
            h('span',{style:{fontSize:'.72rem',fontWeight:600,color:'#fff'}},'ISC'),
            h('span',{style:{fontSize:'1.05rem',fontWeight:700,color:'#f1f5f9'}},iscVal.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})),
            h('span',{style:{fontSize:'.6rem',color:'#6b7280'}},'h')
          ),
          repl&&iscReplVal>0&&h('div',{style:{display:'flex',alignItems:'baseline',gap:'5px'}},
            h('span',{style:{fontSize:'.72rem',fontWeight:600,color:'#fff'}},'ISC'),
            h('span',{style:{fontSize:'1.05rem',fontWeight:700,color:'#60a5fa'}},iscReplVal.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})),
            h('span',{style:{fontSize:'.6rem',color:'#6b7280'}},'h')
          ),
          hsVal>0&&h('div',{style:{display:'flex',alignItems:'baseline',gap:'5px'}},
            h('span',{style:{fontSize:'.72rem',fontWeight:600,color:'#fff'}},'HS'),
            h('span',{style:{fontSize:'1.05rem',fontWeight:700,color:'#34d399'}},hsVal.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})),
            h('span',{style:{fontSize:'.6rem',color:'#6b7280'}},'h')
          ),
          hsFerieVal>0&&h('div',{style:{display:'flex',alignItems:'baseline',gap:'5px'}},
            h('span',{style:{fontSize:'.72rem',fontWeight:600,color:'#fff'}},'HS JF'),
            h('span',{style:{fontSize:'1.05rem',fontWeight:700,color:'#fb923c'}},hsFerieVal.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})),
            h('span',{style:{fontSize:'.6rem',color:'#6b7280'}},'h')
          )
        )
      ),
      h('div',{className:'msec'},
        h('div',{className:'mlabel'},'Absent / Remplacement'),
        h('div',{className:'tpills'},
          h('button',{className:'tpill'+(absent?' on-abs':''),onClick:()=>{setAbsent(p=>!p);setEvent(null);}},absent?'✕ Absent':'Absent'),
          h('button',{className:'tpill'+(repl?' on-rep':''),onClick:()=>setRepl(repl?null:'M')},repl?'↔ Remplac.':'Remplacement')
        )
      ),
      showDays&&h('div',{className:'msec'},
        h('div',{className:'mlabel'},'Durée (jours)'),
        h('div',{style:{display:'flex',alignItems:'center',gap:'12px'}},
          h('button',{className:'picker-y-btn',onClick:()=>setDays(p=>Math.max(1,p-1))},'-'),
          h('div',{style:{color:'#f1f5f9',fontWeight:600,fontSize:'1rem',minWidth:'24px',textAlign:'center'}},days),
          h('button',{className:'picker-y-btn',onClick:()=>setDays(p=>Math.min(30,p+1))},'+')
        )
      ),
      h('div',{className:'msec'},
        h('div',{className:'mlabel'},'Événement'),
        h('div',{className:'tpills'},
          ...Object.entries(EVENTS).map(([k,v])=>
            h('button',{key:k,className:'tpill',
              style:event===k?{borderColor:v.text,background:v.bg,color:v.text}:{},
              onClick:()=>{setEvent(p=>p===k?null:k);setAbsent(false);}
            },v.label)
          )
        )
      ),
      (canToRah||canToJ||canToV)&&h('div',{className:'msec'},
        h('div',{className:'mlabel'},'Convertir'),
        h('div',{className:'tpills'},
          canToRah&&raw!=='RAH'&&h('button',{key:'rah',className:'tpill'+(manShift==='RAH'?' on-rah':''),onClick:()=>tog('RAH')},manShift==='RAH'?'↺ annuler':'→ RAH'),
          canToJ&&h('button',{key:'j',className:'tpill'+(manShift==='E'?' on-rah':''),style:manShift==='E'?{borderColor:'#eab308',background:'#1a1400',color:'#eab308'}:{},onClick:()=>tog('E')},manShift==='E'?'↺ annuler':'→ J'),
          canToV&&h('button',{key:'v',className:'tpill'+(manShift==='E/'?' on-rah':''),style:manShift==='E/'?{borderColor:'#a16207',background:'#1a1200',color:'#eab308'}:{},onClick:()=>tog('E/')},manShift==='E/'?'↺ annuler':'→ V')
        )
      ),
      repl&&h('div',{className:'msec'},
        h('div',{className:'mlabel'},'Quart de remplacement'),
        h('div',{className:'qopts'},
          ['M','APM','N'].map(q=>{
            const rm=REPL[q],sel=repl===q;
            return h('button',{key:q,className:'qopt',
              style:{background:sel?rm.badge+'25':'#0e0f12',borderColor:sel?rm.badge:'#23262e',color:sel?rm.badge:'#6b7280'},
              onClick:()=>setRepl(q)
            },rm.label);
          })
        )
      ),
      h('div',{className:'msec'},
        h('div',{className:'mlabel'},'Note'),
        h('textarea',{className:'mnote',placeholder:'Ajouter une note…',value:note,onChange:e=>setNote(e.target.value)})
      ),
      h('div',{className:'mact'},
        h('button',{className:'bcanc',onClick:onClose},'Annuler'),
        ex&&h('button',{className:'bdel',onClick:()=>onSave(null)},'Effacer'),
        h('button',{className:'bsave',onClick:save},'Enregistrer')
      )
    )
  );
}

// ── Synchronisation en ligne (Google Apps Script) ──
const SYNC_URL='https://script.google.com/macros/s/AKfycbytymjnRx9w4w-Z1zqYYYEMPAW8Yyqa_66Y_GGe-YZe9s-oKXBwRCq9kyVlIlk8Gojz/exec';
const SYNC_TOKEN='planning-quart-paga';
const SYNC_ON=!!(SYNC_URL&&SYNC_TOKEN);

async function syncPull(){
  if(!SYNC_ON)return null;
  try{
    const r=await fetch(SYNC_URL+'?token='+encodeURIComponent(SYNC_TOKEN));
    const j=await r.json();
    if(j&&j.ok)return j.data||{};
  }catch(e){}
  return null;
}
async function syncPush(agent,ov){
  if(!SYNC_ON)return;
  try{
    await fetch(SYNC_URL,{method:'POST',body:JSON.stringify({token:SYNC_TOKEN,agent,ov:ov||{}})});
  }catch(e){}
}

// ── App ──
const TABS=[
  {id:'paga',   label:'Paga',     key:'quart-v2',          isPaga:true,  color:'#3b82f6', bg:'#0d1730', border:'#1d4ed8'},
  {id:'fort',   label:'Fort',     key:'quart-v2-fort',     isPaga:false, color:'#8b5cf6', bg:'#16102c', border:'#6d28d9'},
  {id:'serp',   label:'Serpaggi', key:'quart-v2-serp',     isPaga:false, color:'#10b981', bg:'#062a1e', border:'#047857'},
  {id:'matt',   label:'Matteoni', key:'quart-v2-matt',     isPaga:false, color:'#f59e0b', bg:'#291a04', border:'#b45309'},
  {id:'cesa',   label:'Cesari',   key:'quart-v2-cesa',     isPaga:false, color:'#f43f5e', bg:'#290c13', border:'#be123c'},
];

function Root(){
  const [activeTab,setActiveTab]=useState('paga');
  const [bilanM,setBilanM]=useState(false);
  const [bilanA,setBilanA]=useState(false);
  const [allOv,setAllOv]=useState({});
  const [view,setView]=useState({y:new Date().getFullYear(),m:new Date().getMonth()});
  const [syncState,setSyncState]=useState(SYNC_ON?'sync':'off'); // 'sync' | 'ok' | 'err' | 'off'
  const tab=TABS.find(t=>t.id===activeTab);

  const readLocalAll=()=>{
    const loaded={};
    TABS.forEach(t=>{
      try{const r=localStorage.getItem(t.key);loaded[t.id]=r?JSON.parse(r):{};} catch(e){loaded[t.id]={};}
    });
    return loaded;
  };

  // Load from localStorage immediately, then pull from server
  useEffect(()=>{
    setAllOv(readLocalAll());
    if(!SYNC_ON)return;
    let cancelled=false;
    (async()=>{
      const server=await syncPull();
      if(cancelled)return;
      if(server===null){setSyncState('err');return;}
      const merged={};
      TABS.forEach(t=>{
        const online=server[t.id];
        let local={};
        try{const r=localStorage.getItem(t.key);local=r?JSON.parse(r):{};}catch(e){}
        if(online&&Object.keys(online).length){
          // Le serveur fait foi → restaure en local
          try{localStorage.setItem(t.key,JSON.stringify(online));}catch(e){}
          merged[t.id]=online;
        } else {
          // Serveur vide pour cet agent : on garde le local et on l'envoie (première sauvegarde)
          merged[t.id]=local;
          if(Object.keys(local).length)syncPush(t.id,local);
        }
      });
      setAllOv(merged);
      window.dispatchEvent(new Event('sync-pulled'));
      setSyncState('ok');
    })();
    return()=>{cancelled=true;};
  },[]);

  // Listen for storage changes (when App persists)
  useEffect(()=>{
    const onStorage=()=>setAllOv(readLocalAll());
    window.addEventListener('storage-quart',onStorage);
    return()=>window.removeEventListener('storage-quart',onStorage);
  },[]);

  const bstyle={flex:1,padding:'16px 12px',borderRadius:'14px',border:'1px solid #23262e',background:'#141519',color:'#e2e8f0',fontFamily:"'Inter',sans-serif",fontSize:'1.15rem',fontWeight:600,cursor:'pointer',WebkitTapHighlightColor:'transparent',letterSpacing:'.01em'};
  const dotColor=syncState==='ok'?'#10b981':syncState==='sync'?'#f59e0b':syncState==='err'?'#ef4444':'#475569';
  const dotLabel=syncState==='ok'?'Sauvegardé':syncState==='sync'?'Synchro…':syncState==='err'?'Hors-ligne':'';

  return h(Fragment,null,
    h('div',{style:{background:'#0a0b0d',padding:'12px 0 0',position:'sticky',top:0,zIndex:100}},
      SYNC_ON&&h('div',{style:{display:'flex',alignItems:'center',justifyContent:'flex-end',gap:'6px',padding:'0 12px 8px'}},
        h('span',{style:{width:'7px',height:'7px',borderRadius:'50%',background:dotColor,flexShrink:0,transition:'background .2s'}}),
        h('span',{style:{fontSize:'.62rem',color:'#5b626e',fontWeight:500,letterSpacing:'.02em'}},dotLabel)
      ),
      h('div',{style:{display:'flex',gap:'10px',padding:'0 10px 10px'}},
        h('button',{style:bstyle,onClick:()=>setBilanM(true)},'Mensuel'),
        h('button',{style:bstyle,onClick:()=>setBilanA(true)},'Annuel')
      )
    ),
    h(App,{key:tab.key,storageKey:tab.key,agentId:tab.id,isPaga:tab.isPaga,tabLabel:tab.label,tabColor:tab.color,onViewChange:setView,onSynced:()=>setSyncState('ok'),onSyncing:()=>setSyncState('sync')}),
    h('div',{style:{background:'#0a0b0d',padding:'0 0 calc(12px + env(safe-area-inset-bottom))',position:'sticky',bottom:0,zIndex:100}},
      h('div',{className:'tabs'},
        TABS.map(t=>h('button',{
          key:t.id,
          className:'tab',
          style:activeTab===t.id
            ? {background:t.bg, borderColor:t.border, color:t.color}
            : {},
          onClick:()=>setActiveTab(t.id)
        },t.label))
      )
    ),
    bilanM&&h(BilanMensuel,{view,allOv,onClose:()=>setBilanM(false)}),
    bilanA&&h(BilanAnnuel,{view,allOv,onClose:()=>setBilanA(false)})
  );
}

function App({storageKey,agentId,isPaga,tabLabel,tabColor,onViewChange,onSynced,onSyncing}){
  const today=new Date();
  const [view,setView]=useState({y:today.getFullYear(),m:today.getMonth()});
  const [ov,setOv]=useState({});
  const [modal,setModal]=useState(null);
  const [picker,setPicker]=useState(false);
  const [iscDetail,setIscDetail]=useState(false);
  const [hsDetail,setHsDetail]=useState(false);
  const [caDetail,setCaDetail]=useState(false);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    setOv({});
    setLoaded(false);
    try{const r=localStorage.getItem(storageKey);if(r)setOv(JSON.parse(r));}catch(e){}
    setLoaded(true);
  },[storageKey]);

  // Reload this tab's data when an online pull completes
  useEffect(()=>{
    const onPulled=()=>{
      try{const r=localStorage.getItem(storageKey);setOv(r?JSON.parse(r):{});}catch(e){}
    };
    window.addEventListener('sync-pulled',onPulled);
    return()=>window.removeEventListener('sync-pulled',onPulled);
  },[storageKey]);

  // Notify Root of view changes for bilan context
  useEffect(()=>{if(onViewChange)onViewChange(view);},[view]);

  const persist=useCallback(next=>{
    setOv(next);
    try{localStorage.setItem(storageKey,JSON.stringify(next));window.dispatchEvent(new Event('storage-quart'));}catch(e){}
    if(SYNC_ON){
      if(onSyncing)onSyncing();
      syncPush(agentId,next).then(()=>{if(onSynced)onSynced();});
    }
  },[storageKey,agentId,onSyncing,onSynced]);

  const goPrev=()=>setView(v=>v.m===0?{y:v.y-1,m:11}:{y:v.y,m:v.m-1});
  const goNext=()=>setView(v=>v.m===11?{y:v.y+1,m:0}:{y:v.y,m:v.m+1});

  const tk=dkey(today);
  const first=new Date(view.y,view.m,1);
  const off=first.getDay()===0?6:first.getDay()-1;
  const cells=Array.from({length:Math.ceil((off+new Date(view.y,view.m+1,0).getDate())/7)*7},(_,i)=>addDays(addDays(first,-off),i));
  const allFeries=new Set([...getFeries(view.y-1),...getFeries(view.y),...getFeries(view.y+1)]);
  const isc=calcISC(view,ov,allFeries);
  const hs=calcHS(view,ov,allFeries)||0;
  const ca=calcCA(view,ov);

  const open=d=>{if(d.getMonth()!==view.m)return;setModal({date:d,shift:getShift(d)});};
  const save=(data,numDays)=>{
    const next={...ov};
    const nd=numDays||1;
    if(data===null){
      // Effacer: on efface seulement le jour cliqué
      delete next[dkey(modal.date)];
    } else {
      for(let i=0;i<nd;i++){
        const dd=addDays(modal.date,i);
        next[dkey(dd)]={...data};
      }
    }
    persist(next);setModal(null);
  };

  if(!loaded)return h('div',{style:{background:'#0a0b0d',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'#374151'}},'···');

  return h('div',{className:'root'},
    h('div',{className:'hdr'},
      h('button',{className:'nav',onClick:e=>{e.currentTarget.blur();goPrev();}},'‹'),
      h('div',{className:'mlbl',onClick:()=>setPicker(true)},MOIS[view.m]+' '+view.y),
      h('button',{className:'nav',onClick:e=>{e.currentTarget.blur();goNext();}},'›')
    ),
    h('div',{className:'dow'},JOURS.map((j,i)=>h('div',{key:i,className:'dh'},j))),
    h('div',{className:'grid',style:{borderRadius:'12px',outline:'2px solid '+(tabColor||'#2563eb')+'40',outlineOffset:'3px'}},
      cells.map((d,i)=>{
        const inM=d.getMonth()===view.m,key=dkey(d),raw=getShift(d),o=ov[key];
        const effShift=(o&&o.manShift)||raw,s=SHIFT[effShift]||SHIFT.RAH;
        const isAbs=o&&o.absent,replMeta=(o&&o.repl)?REPL[o.repl]:null;
        const evKey=o&&o.event,evMeta=evKey?EVENTS[evKey]:null;
        const isToday=key===tk,isFerie=allFeries.has(key);
        const prevD=addDays(d,-1),nextD=addDays(d,1);
        const prevO=ov[dkey(prevD)],nextO=ov[dkey(nextD)];
        const prevShift=(prevO&&prevO.manShift)||getShift(prevD);
        const nextShift=(nextO&&nextO.manShift)||getShift(nextD);
        const jL=inM&&!isAbs&&!evMeta&&!replMeta&&!(prevO&&(prevO.repl||prevO.absent||prevO.event))&&prevD.getMonth()===view.m&&prevShift===effShift;
        const jR=inM&&!isAbs&&!evMeta&&!replMeta&&!(nextO&&(nextO.repl||nextO.absent||nextO.event))&&nextD.getMonth()===view.m&&nextShift===effShift;
        const R='17px',F='0px';
        const pr=jL&&jR?F+' '+F+' '+F+' '+F:jL?F+' '+R+' '+R+' '+F:jR?R+' '+F+' '+F+' '+R:R+' '+R+' '+R+' '+R;
        const pL=jL?'calc(-50% - 1px)':'0',pRt=jR?'calc(-50% - 1px)':'0';
        const dow=d.getDay(),isWE=dow===0||dow===6;
        const cc='cell'+(!inM?' out':'')+(isToday?' today':'')+(isFerie&&inM?' ferie':isWE&&inM?' weekend':'');
        // Badge-tr = badge du changement (repl/event/absent)
        const trBadge=!inM?null
          : replMeta ? {bg:replMeta.badge,col:replMeta.text,lbl:replMeta.short,fs:replMeta.short.length===1?'1rem':replMeta.short.length===2?'.65rem':'.48rem'}
          : evMeta   ? {bg:evMeta.bg,col:evMeta.text,lbl:evMeta.short,fs:evMeta.short.length===1?'1rem':evMeta.short.length===2?'.72rem':'.5rem'}
          : isAbs    ? ABSENT_BADGE
          : null;
        // Libellé bas encadré = quart théorique, uniquement pour repl/event/absent
        const showLbl=inM&&(replMeta||evMeta||isAbs);
        return h('div',{key:i,className:cc,onClick:()=>open(d)},
          h('div',{className:'dn'},d.getDate()),
          !trBadge&&h('div',{className:'pill-wrap'},
            h('div',{className:'pill-abs',style:{background:s.badge,color:s.text,fontSize:s.fs,borderRadius:pr,left:pL,right:pRt}},s.short)
          ),
          trBadge&&h('div',{className:'badge-tr',style:{background:trBadge.bg,color:trBadge.col,fontSize:trBadge.fs}},trBadge.lbl),
          showLbl&&h('div',{className:'repl-lbl',style:{background:s.badge,color:s.text}},s.short),
          showLbl&&o&&o.note&&h('div',{className:'note-change'},o.note),
          !showLbl&&o&&o.note&&h('div',{className:'note'},o.note)
        );
      })
    ),
    modal&&h(Modal,{modal,ov,onSave:save,onClose:()=>setModal(null)}),
    iscDetail&&h(IscDetail,{isc,hs,view,showEuros:isPaga,onClose:()=>setIscDetail(false)}),
    caDetail&&h(CaDetail,{ca,view,onClose:()=>setCaDetail(false)}),
    picker&&h(Picker,{view,onSelect:(y,m)=>{setView({y,m});setPicker(false);},onClose:()=>setPicker(false)})
  );
}

function BilanMensuel({view,allOv,onClose}){
  const R=19.85;
  const fmt2=v=>v.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const allF=new Set([...getFeries(view.y-1),...getFeries(view.y),...getFeries(view.y+1)]);
  const data=TABS.map(t=>{
    const ov=allOv[t.id]||{};
    const isc=calcISC(view,ov,allF);
    const hs=calcHS(view,ov,allF)||0;
    const ca=calcCA(view,ov);
    const total=Math.round((isc.total+hs)*100)/100;
    return{label:t.label,isPaga:t.isPaga,isc,hs,ca,total};
  });
  const colHdr=(txt,col)=>h('div',{style:{textAlign:'right',paddingBottom:'6px'}},
    h('span',{style:{fontSize:'.72rem',fontWeight:700,color:col,textTransform:'uppercase',letterSpacing:'.08em'}},''),
    h('span',{style:{fontSize:'.72rem',fontWeight:700,color:col,textTransform:'uppercase',letterSpacing:'.08em'}},''),
    txt
  );
  return h('div',{className:'mbg',onClick:onClose},
    h('div',{className:'mcard',onClick:e=>e.stopPropagation()},
      h('div',{className:'mhandle'}),
      h('div',{style:{marginBottom:'16px'}},
        h('div',{style:{fontSize:'.65rem',color:'#64748b',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:'4px'}},MOIS[view.m]+' '+view.y),
        h('div',{style:{fontSize:'1.15rem',fontWeight:700,color:'#f1f5f9'}},'Bilan mensuel — Équipe')
      ),
      data.map(({label,isPaga,isc,hs,ca,total},idx)=>{
        const t=TABS[idx];
        return h('div',{key:label,style:{
          padding:'12px 14px',borderRadius:'12px',
          background:t.bg,
          border:'1px solid '+t.border+'60',
          marginBottom:'8px',
        }},
          // Top row: name + total
          h('div',{style:{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:'8px'}},
            h('span',{style:{fontSize:'1.15rem',fontWeight:700,color:t.color}},(label)),
            h('div',{style:{display:'flex',alignItems:'baseline',gap:'4px'}},
              h('span',{style:{fontSize:'1.5rem',fontWeight:700,color:'#f1f5f9'}},fmt2(total)),
              h('span',{style:{fontSize:'.7rem',color:'#64748b'}},'h')
            )
          ),
          // Bottom row: ISC / HS / Absences
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px',borderTop:'1px solid '+t.border+'30',paddingTop:'8px'}},
            h('div',null,
              h('div',{style:{fontSize:'.55rem',color:'#cbd5e1',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'2px'}},'ISC'),
              h('div',{style:{fontSize:'1rem',fontWeight:700,color:isc.total>0?'#f1f5f9':'#475569'}},fmt2(isc.total)),
              isPaga&&isc.total>0&&h('div',{style:{fontSize:'.58rem',color:'#64748b'}},fmt2(isc.total*R)+'€')
            ),
            h('div',null,
              h('div',{style:{fontSize:'.55rem',color:'#4ade80',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'2px'}},'HS'),
              h('div',{style:{fontSize:'1rem',fontWeight:700,color:hs>0?'#4ade80':'#334155'}},fmt2(hs)),
              isPaga&&hs>0&&h('div',{style:{fontSize:'.58rem',color:'#64748b'}},fmt2(hs*R)+'€')
            ),
            h('div',null,
              h('div',{style:{fontSize:'.55rem',color:'#fb923c',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'2px'}},'Absences'),

    h('div',{style:{flex:1}},
      h('div',{style:{fontSize:'.88rem',fontWeight:600,color:color||'#e2e8f0'}},label)

    h('div',{style:{textAlign:'right'}},
      h('div',{style:{display:'flex',alignItems:'baseline',gap:'3px',justifyContent:'flex-end'}},
        h('span',{style:{fontSize:'1.3rem',fontWeight:700,color:color||'#f1f5f9'}},fmt2(val)),

          h('div',{className:'mshift'},'Heures générées')

      ),
      h('div',null,
        // Groupe ISC
        h('div',{className:'detail-row',style:{alignItems:'center'}},
          h('div',{style:{flex:1}},
            h('div',{style:{fontSize:'1rem',fontWeight:700,color:'#f1f5f9'}},'ISC'),
          ),
          h('div',{style:{textAlign:'right'}},
            h('div',{style:{display:'flex',alignItems:'baseline',gap:'3px',justifyContent:'flex-end'}},
