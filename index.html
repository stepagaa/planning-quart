<body>
<div id="root"></div>
<script>
const {useState,useEffect,useCallback,createElement:h,Fragment}=React;

const ROULEMENT=[
  ["M","M","M","APM","APM","N","N"],
  ["RAH","RH","RH","RAH","RAH","M","M"],
  ["APM","APM","APM","N","N","RAH","RAH"],
  ["RAH","RH","RH","M","M","APM","APM"],
  ["N","N","N","RAH","RAH","E","E"],
  ["E/","RH","RH","RAH","RAH","RAH","RAH"],
];

function easterDate(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),hh=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4;
  const l=(32+2*e+2*i-hh-k)%7,mn=Math.floor((a+11*hh+22*l)/451);
  return new Date(y,Math.floor((hh+l-7*mn+114)/31)-1,((hh+l-7*mn+114)%31)+1);
}
function getFeries(y){
  const e=easterDate(y),aD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
  const f=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return new Set([y+'-01-01',y+'-05-01',y+'-05-08',y+'-07-14',y+'-08-15',y+'-11-01',y+'-11-11',y+'-12-25',f(aD(e,1)),f(aD(e,39)),f(aD(e,50))]);
}

const SHIFT={
  M:   {badge:"#2563eb",text:"#fff",   short:"M",  label:"Matin",      fs:"1rem"},
  APM: {badge:"#dc2626",text:"#fff",   short:"APM",label:"Après-midi", fs:".58rem"},
  N:   {badge:"#0a0b0f",text:"#e2e8f0",short:"N",  label:"Nuit",       fs:"1rem"},
  RAH: {badge:"#374151",text:"#fff",   short:"RAH",label:"Repos",      fs:".54rem"},
  RH:  {badge:"#374151",text:"#fff",   short:"RH", label:"Repos",      fs:".54rem"},
  E:   {badge:"#eab308",text:"#1e293b",short:"J",  label:"J",          fs:"1rem"},
  "E/":{badge:"#eab308",text:"#1e293b",short:"V",  label:"V",          fs:"1rem"},
};
const REPL={
  M:  {badge:"#2563eb",text:"#fff",   short:"M",  label:"Matin"},
  APM:{badge:"#dc2626",text:"#fff",   short:"APM",label:"APM"},
  N:  {badge:"#0a0b0f",text:"#e2e8f0",short:"N",  label:"Nuit"},
};
// Absences
const ABSENCE_TYPES={
  CA: {bg:"#0891b2",col:"#fff",lbl:"CA", label:"CA"},
  RC: {bg:"#0d9488",col:"#fff",lbl:"RC", label:"RC"},
  MAL:{bg:"#7c3aed",col:"#fff",lbl:"MAL",label:"Maladie"},
  HP: {bg:"#1e3a5f",col:"#93c5fd",lbl:"HP",label:"HP"},
};
// Événements
const EVENT_TYPES={
  reunion:  {bg:"#065f46",col:"#6ee7b7",lbl:"RÉU",label:"Réunion"},
  cph:      {bg:"#7c2d12",col:"#fdba74",lbl:"CPH",label:"CPH"},
  formation:{bg:"#22c55e",col:"#fff",   lbl:"F",  label:"Formation"},
};
// Backward compat
const EVENTS={
  formation:{bg:"#22c55e",label:"Formation",short:"F",text:"#fff",col:"#fff"},
  bj:       {bg:"#7c2d12",label:"BJ",        short:"BJ",text:"#fdba74"},
  hp:       {bg:"#1e3a5f",label:"HP",        short:"HP",text:"#93c5fd"},
  rs:       {bg:"#065f46",label:"RS",        short:"RÉU",text:"#6ee7b7"},
};
const ABSENT_BADGE=ABSENCE_TYPES.CA;
// Helper : badge de changement pour la case calendrier
function getChangeMeta(o){
  if(!o)return null;
  if(o.absent)return ABSENCE_TYPES.CA;
  if(o.absenceType&&ABSENCE_TYPES[o.absenceType])return ABSENCE_TYPES[o.absenceType];
  if(o.repl&&REPL[o.repl]){const r=REPL[o.repl];return{bg:r.badge,col:r.text,lbl:r.short};}
  if(o.event==='reunion'||o.event==='rs')return EVENT_TYPES.reunion;
  if(o.event==='cph'||o.event==='bj')return EVENT_TYPES.cph;
  if(o.event==='formation')return EVENT_TYPES.formation;
  if(o.event&&EVENTS[o.event]){const ev=EVENTS[o.event];return{bg:ev.bg,col:ev.text||ev.col,lbl:ev.short||o.event};}
  return null;
}
// ============ MOTEUR DE CALCUL — VERSION 2 (par plages horaires) ============
// Plages : jour 06:00–20:00, nuit 20:00–06:00. Chaque heure évaluée selon sa date réelle.
const ISC_RATE={
  jour:{sem:0.10, sam:0.40, dim:0.50},
  nuit:{sem:0.40, sam:0.40, dim:0.50},
};
const HS_RATE={
  jour:{sem:1.50, sam:1.75, dim:1.75},
  nuit:{sem:2.00, sam:2.25, dim:2.25},
};
const FERIE_IND={jour:1.75, nuit:2.25};
const IND_REMPL={M:1.5, APM:1.75, N:2};
const DUREE={M:6.75, APM:8, N:10};

// Dates de référence pour le décalage ISC remplacement
const REF_SEM=new Date(2025,0,8);  // mercredi
const REF_SAM=new Date(2025,0,4);  // samedi
const REF_DIM=new Date(2025,0,5);  // dimanche
const NO_FERIES=new Set();

function shiftInterval(d, shift){
  const s=new Date(d), e=new Date(d);
  if(shift==='M'){ s.setHours(5,45,0,0); e.setHours(12,30,0,0); }
  else if(shift==='APM'){ s.setHours(12,15,0,0); e.setHours(20,15,0,0); }
  else if(shift==='N'){ s.setHours(20,0,0,0); e.setHours(6,0,0,0); e.setDate(e.getDate()+1); }
  else return null;
  return {start:s, end:e};
}

// Découpe un intervalle aux frontières 06:00 / 20:00 / minuit → segments {hours, band, date}
function workSegments(start, end){
  const segs=[]; let cur=new Date(start);
  while(cur<end){
    const h=cur.getHours();
    const b=new Date(cur);
    if(h<6) b.setHours(6,0,0,0);
    else if(h<20) b.setHours(20,0,0,0);
    else { b.setHours(0,0,0,0); b.setDate(b.getDate()+1); }
    const segEnd = b<end ? b : end;
    const hours=(segEnd-cur)/3600000;
    if(hours>0) segs.push({hours, band:(h<6||h>=20)?'nuit':'jour', date:new Date(cur)});
    cur=segEnd;
  }
  return segs;
}

function dateType(d, feries){
  if(feries.has(dkey(d))) return 'dim';
  const dow=d.getDay();
  if(dow===0) return 'dim';
  if(dow===6) return 'sam';
  return 'sem';
}

// ISC théorique d'un quart travaillé
function iscShiftBands(d, shift, feries){
  const iv=shiftInterval(d, shift); if(!iv) return 0;
  let t=0;
  for(const sg of workSegments(iv.start, iv.end)) t += sg.hours * ISC_RATE[sg.band][dateType(sg.date, feries)];
  return t;
}

// ISC remplacement : décalage d'un cran (sem→sam, sam→dim, dim→dim) via date de référence
function bumpRef(d, feries){
  const dt=dateType(d, feries);
  if(dt==='sem') return REF_SAM;
  return REF_DIM;
}
function iscRemplBands(d, replShift, feries){
  return iscShiftBands(bumpRef(d, feries), replShift, NO_FERIES);
}

// HS d'un quart (remplacement), par plages, type réel
function hsShiftBands(d, shift, feries){
  const iv=shiftInterval(d, shift); if(!iv) return 0;
  let t=0;
  for(const sg of workSegments(iv.start, iv.end)) t += sg.hours * HS_RATE[sg.band][dateType(sg.date, feries)];
  return t;
}

// Indemnité férié (quart théorique travaillé) : heures tombant sur un férié
function indemniteFerie(d, shift, feries){
  const iv=shiftInterval(d, shift); if(!iv) return 0;
  let t=0;
  for(const sg of workSegments(iv.start, iv.end)) if(feries.has(dkey(sg.date))) t += sg.hours * FERIE_IND[sg.band];
  return t;
}

// Quart effectivement travaillé un jour (remplacement prioritaire, sinon quart théo M/APM/N)
function effShift(d, ov, agentId){
  const o=ov[dkey(d)];
  if(o&&o.absent) return null;
  if(o&&o.repl) return o.repl;
  const theo=(o&&o.manShift)||getEffShiftCode(d,agentId);
  return (theo==='M'||theo==='APM'||theo==='N')?theo:null;
}

// Heures réellement travaillées sur la journée D (00:00–24:00), queue de nuit de la veille incluse
function workedHoursOnDate(D, ov, agentId){
  const dayStart=new Date(D); dayStart.setHours(0,0,0,0);
  const dayEnd=new Date(dayStart); dayEnd.setDate(dayEnd.getDate()+1);
  let t=0;
  [addDays(D,-1), D].forEach(day=>{
    const sh=effShift(day, ov, agentId); if(!sh) return;
    const iv=shiftInterval(day, sh); if(!iv) return;
    const a=Math.max(iv.start, dayStart), b=Math.min(iv.end, dayEnd);
    if(b>a) t += (b-a)/3600000;
  });
  return t;
}

// Détail d'un jour : toutes les composantes
function calcDay(d, ov, feries, agentId){
  const o=ov[dkey(d)];
  const res={iscTh:0, iscRe:0, hs:0, indRempl:0, indFerie:0, credit:0, sup:0, ca:0};
  if(!agentPhase(agentId,d).active) return res;
  if(o&&(o.absent||o.absenceType)){ res.ca=(DUREE[getShift(d,agentId)]||0); return res; }
  const theo=(o&&o.manShift)||getEffShiftCode(d,agentId);
  const isFerie=feries.has(dkey(d));
  const is1Mai=dkey(d).endsWith('-05-01');
  const theoWorked=(theo==='M'||theo==='APM'||theo==='N');
  const theoRepos=(theo==='RAH'||theo==='RH');

  if(theoWorked) res.iscTh += iscShiftBands(d, theo, feries);
  if(isFerie && theoWorked) res.indFerie += indemniteFerie(d, theo, feries);

  if(o&&o.repl){
    res.iscRe += iscRemplBands(d, o.repl, feries);
    res.hs += hsShiftBands(d, o.repl, feries);
    res.indRempl += (IND_REMPL[o.repl]||0);
  }

  if(o&&o.event==='formation' && theoRepos){
    res.hs += 7 * HS_RATE.jour[dateType(d, feries)];
  }

  if(isFerie){
    if(theoRepos){ res.credit += 7; if(o&&o.repl) res.credit += workedHoursOnDate(d, ov, agentId); }
    else if(theoWorked){ res.credit += workedHoursOnDate(d, ov, agentId); }
  }

  if(is1Mai){
    let w=workedHoursOnDate(d, ov, agentId);
    if(o&&o.event==='formation'&&theoRepos) w+=7;
    res.sup += w;
  }
  return res;
}

function calcMonth(view, ov, feries, agentId){
  const last=new Date(view.y, view.m+1, 0);
  let iscTh=0,iscRe=0,hs=0,indRempl=0,indFerie=0,credit=0,sup=0,ca=0;
  for(let day=1; day<=last.getDate(); day++){
    const x=calcDay(new Date(view.y,view.m,day), ov, feries, agentId);
    iscTh+=x.iscTh; iscRe+=x.iscRe; hs+=x.hs; indRempl+=x.indRempl; indFerie+=x.indFerie; credit+=x.credit; sup+=x.sup; ca+=x.ca;
  }
  const r=v=>Math.round(v*100)/100;
  const iscTotal=r(iscTh+iscRe), indTotal=r(indRempl+indFerie+credit+sup);
  return {
    isc:{total:iscTotal, th:r(iscTh), repl:r(iscRe)},
    hs:r(hs),
    ind:{total:indTotal, rempl:r(indRempl), ferie:r(indFerie), credit:r(credit), sup:r(sup)},
    ca:r(ca),
    total:r(iscTotal+hs+indTotal),
  };
}

// Wrappers compatibles affichage
function calcISC(view, ov, feries, agentId){ return calcMonth(view, ov, feries, agentId).isc; }
function calcHS(view, ov, feries, agentId){ return calcMonth(view, ov, feries, agentId).hs; }
function calcInd(view, ov, feries, agentId){ return calcMonth(view, ov, feries, agentId).ind; }
function calcCA(view, ov, agentId){
  const f=new Set([...getFeries(view.y-1),...getFeries(view.y),...getFeries(view.y+1)]);
  return calcMonth(view, ov, f, agentId).ca;
}

function calcAnnuel(year, ov, agentId){
  const allF=new Set([...getFeries(year-1),...getFeries(year),...getFeries(year+1)]);
  const r=v=>Math.round(v*100)/100;
  let isc={total:0,th:0,repl:0}, hs=0, ind={total:0,rempl:0,ferie:0,credit:0,sup:0}, ca=0;
  const months=[];
  for(let m=0;m<12;m++){
    const mm=calcMonth({y:year,m}, ov, allF, agentId);
    months.push({m, isc:mm.isc, hs:mm.hs, ind:mm.ind, ca:mm.ca, total:mm.total});
    isc.total=r(isc.total+mm.isc.total); isc.th=r(isc.th+mm.isc.th); isc.repl=r(isc.repl+mm.isc.repl);
    hs=r(hs+mm.hs);
    ind.total=r(ind.total+mm.ind.total); ind.rempl=r(ind.rempl+mm.ind.rempl); ind.ferie=r(ind.ferie+mm.ind.ferie); ind.credit=r(ind.credit+mm.ind.credit); ind.sup=r(ind.sup+mm.ind.sup);
    ca=r(ca+mm.ca);
  }
  return {isc, hs, ind, ca, months, total:r(isc.total+hs+ind.total)};
}

const MOIS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const JOURS=["L","M","M","J","V","S","D"];
const REF=new Date(2025,11,26);

// ── Démarrage & phases par agent ───────────────────────────────────
// Planning global à partir du 1er janvier 2026 (pas d'historique avant).
const GLOBAL_START=new Date(2026,0,1);
// Cesari : intègre l'équipe le 1er juin 2026.
const AGENT_START={cesa2:new Date(2026,5,1)};
// Serpaggi : avant le 22 avril 2026, ancien roulement = même cycle décalé de +28 j
// (réf 28/11/2025) → jeudi 1er janvier 2026 = J (pos 34), vendredi 2 = V (pos 35).
const SERP_REF=new Date(2025,10,28);
const SERP_CUTOVER=new Date(2026,3,22);

function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function dkey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function sharedPos(d){return((Math.round((d-REF)/86400000)%42)+42)%42;}
// Phase d'un agent à une date : {active, pos cycle, entretien (conversions auto rose/été)}
function agentPhase(agentId,d){
  const start=AGENT_START[agentId]||GLOBAL_START;
  if(d<start) return {active:false,pos:-1,entretien:false};
  if(agentId==='serp2' && d<SERP_CUTOVER){
    const pos=((Math.round((d-SERP_REF)/86400000)%42)+42)%42;
    return {active:true,pos,entretien:false};
  }
  return {active:true,pos:sharedPos(d),entretien:true};
}
function getShift(d,agentId){const ph=agentPhase(agentId,d);return ph.active?ROULEMENT[Math.floor(ph.pos/7)][ph.pos%7]:null;}
function cyclePos(d,agentId){const ph=agentPhase(agentId,d);return ph.active?ph.pos:-1;}
function isRahConvertible(d,agentId){const p=cyclePos(d,agentId);return p===38||p===39;}
function isJConvertible(d,agentId){const p=cyclePos(d,agentId);return p===33||p===34;}
function isVConvertible(d,agentId){const p=cyclePos(d,agentId);return p===35;}

// ── Semaines d'entretien ──────────────────────────────────────────
// Positions modifiables dans le cycle : 33,34 (J), 35 (V), 38,39 (Lun/Mar Sem6)
const ENT_POS=new Set([33,34,35,38,39]);
const _entCache={};

function getEntretienAnchors(year){
  // Ancre = Ven V (pos 35). Première occurrence : REF+35 jours.
  const first35=addDays(REF,35);
  const s=new Date(year,0,1),e=new Date(year,11,31);
  const diffMs=s-first35;
  let k=Math.max(0,Math.floor(diffMs/(42*86400000)));
  const anchors=[];
  let d=addDays(first35,k*42);
  while(d<=e){if(d>=s)anchors.push(new Date(d));d=addDays(d,42);}
  return anchors;
}

function getEntretienTypes(year){
  if(_entCache[year])return _entCache[year];
  const anchors=getEntretienAnchors(year);
  const j15=new Date(year,5,15), s15=new Date(year,8,15);
  const before=anchors.filter(a=>a<j15);
  const summer=anchors.filter(a=>a>=j15&&a<=s15);
  const after=anchors.filter(a=>a>s15);
  const pink=new Set();
  if(before.length)pink.add(dkey(before[before.length-1]));
  if(after.length) pink.add(dkey(after[0]));
  _entCache[year]={pink,summer:new Set(summer.map(a=>dkey(a)))};
  return _entCache[year];
}

function getEntretienAnchorOf(d){
  // Retourne la date d'ancre (Ven V) de la période d'entretien contenant d
  return addDays(d,35-sharedPos(d));
}

// Code de quart effectif (pour les calculs)
function getEffShiftCode(d,agentId){
  const ph=agentPhase(agentId,d);
  if(!ph.active) return null;
  const raw=ROULEMENT[Math.floor(ph.pos/7)][ph.pos%7];
  if(!ph.entretien || !ENT_POS.has(ph.pos)) return raw;
  const anchor=getEntretienAnchorOf(d);
  const types=getEntretienTypes(anchor.getFullYear());
  const ak=dkey(anchor);
  if(types.pink.has(ak)) return 'RAH';
  if(types.summer.has(ak)&&(ph.pos===35||ph.pos===38||ph.pos===39)) return 'E';
  return raw;
}

// Meta visuelle du quart (inclut le rose pour les semaines roses)
function getEffShiftMeta(d,agentId){
  const ph=agentPhase(agentId,d);
  if(!ph.active) return null;
  const raw=ROULEMENT[Math.floor(ph.pos/7)][ph.pos%7];
  if(!ph.entretien || !ENT_POS.has(ph.pos)) return SHIFT[raw]||SHIFT.RAH;
  const anchor=getEntretienAnchorOf(d);
  const types=getEntretienTypes(anchor.getFullYear());
  const ak=dkey(anchor);
  if(types.pink.has(ak)) return {badge:'#f699cd',text:'#1e293b',short:'RAH',label:'Repos rose',fs:'.54rem'};
  if(types.summer.has(ak)&&(ph.pos===35||ph.pos===38||ph.pos===39)) return SHIFT['E']||SHIFT.RAH;
  return SHIFT[raw]||SHIFT.RAH;
}

// Couleurs : utilitaires pour la hachure du quart théorique remplacé
function hexRgb(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');const n=parseInt(h,16);return[(n>>16)&255,(n>>8)&255,n&255];}
function darken(h,f){const[r,g,b]=hexRgb(h);return'rgb('+Math.round(r*f)+','+Math.round(g*f)+','+Math.round(b*f)+')';}
function hatch(h){return'repeating-linear-gradient(45deg,'+h+' 0 5px,'+darken(h,0.42)+' 5px 10px)';}
function lum(h){const[r,g,b]=hexRgb(h);return(0.299*r+0.587*g+0.114*b)/255;}
function borderCol(h){return lum(h)>0.6?'rgba(0,0,0,0.5)':'rgba(255,255,255,0.5)';}
// Contour sur le pourtour de la barre, sans trait interne entre jours fusionnés
function pillBorder(h,jl,jr){const c=borderCol(h);return{borderTop:'1px solid '+c,borderBottom:'1px solid '+c,borderLeft:jl?'0':'1px solid '+c,borderRight:jr?'0':'1px solid '+c};}

// ── Modal ──
// Détail des segments ISC pour affichage (théorique ou remplacement +1 cran)
function iscSegsDetail(d, shift, feries, bumped=false){
  try{
    const interval=shiftInterval(d,shift);
    const segs=workSegments(interval.start,interval.end);
    const map={};
    segs.forEach(s=>{
      const dt0=dateType(s.date,feries);
      const dt=bumped?(dt0==='sem'?'sam':'dim'):dt0;
      const k=s.band+'-'+dt;
      if(!map[k])map[k]={hours:0,band:s.band,dt,rate:ISC_RATE[s.band][dt],isc:0};
      map[k].hours+=s.hours; map[k].isc+=s.hours*ISC_RATE[s.band][dt];
    });
    return Object.values(map).map(g=>({hours:Math.round(g.hours*100)/100,band:g.band,dt:g.dt,rate:g.rate,isc:Math.round(g.isc*1000)/1000}));
  }catch(e){return[];}
}
function hsSegsDetail(d, shift, feries){
  try{
    const interval=shiftInterval(d,shift);
    const segs=workSegments(interval.start,interval.end);
    const map={};
    segs.forEach(s=>{
      const dt=dateType(s.date,feries);
      const k=s.band+'-'+dt;
      if(!map[k])map[k]={hours:0,band:s.band,dt,rate:HS_RATE[s.band][dt],hs:0};
      map[k].hours+=s.hours; map[k].hs+=s.hours*HS_RATE[s.band][dt];
    });
    return Object.values(map).map(g=>({hours:Math.round(g.hours*100)/100,band:g.band,dt:g.dt,rate:g.rate,hs:Math.round(g.hs*1000)/1000}));
  }catch(e){return[];}
}

// ── Synchronisation en ligne (Google Apps Script) ──
const SYNC_URL='https://script.google.com/macros/s/AKfycbytymjnRx9w4w-Z1zqYYYEMPAW8Yyqa_66Y_GGe-YZe9s-oKXBwRCq9kyVlIlk8Gojz/exec';
const SYNC_TOKEN='planning-quart-paga';
const SYNC_ON=!!(SYNC_URL&&SYNC_TOKEN);

async function syncPull(){
  if(!SYNC_ON)return null;
  try{
    const r=await fetch(SYNC_URL+'?token='+encodeURIComponent(SYNC_TOKEN));
    const j=await r.json();
    if(j&&j.ok)return j.data||{};
  }catch(e){}
  return null;
}
async function syncPush(agent,ov){
  if(!SYNC_ON)return;
  try{
    await fetch(SYNC_URL,{method:'POST',body:JSON.stringify({token:SYNC_TOKEN,agent,ov:ov||{}})});
  }catch(e){}
}

// ── App ──
const TABS=[
  {id:'paga2', label:'Paga',     key:'quart-calc2',       isPaga:true,  color:'#3b82f6', bg:'#0d1730', border:'#1d4ed8'},
  {id:'fort2', label:'Fort',     key:'quart-calc2-fort',  isPaga:false, color:'#8b5cf6', bg:'#16102c', border:'#6d28d9'},
  {id:'serp2', label:'Serpaggi', key:'quart-calc2-serp',  isPaga:false, color:'#10b981', bg:'#062a1e', border:'#047857'},
  {id:'matt2', label:'Matteoni', key:'quart-calc2-matt',  isPaga:false, color:'#f59e0b', bg:'#291a04', border:'#b45309'},
  {id:'cesa2', label:'Cesari',   key:'quart-calc2-cesa',  isPaga:false, color:'#f43f5e', bg:'#290c13', border:'#be123c'},
];

function Root(){
  const [activeTab,setActiveTab]=useState(TABS[0].id);
  const [bilanM,setBilanM]=useState(false);
  const [bilanA,setBilanA]=useState(false);
  const [allOv,setAllOv]=useState({});
  const [view,setView]=useState({y:new Date().getFullYear(),m:new Date().getMonth()});
  const [syncState,setSyncState]=useState(SYNC_ON?'sync':'off'); // 'sync' | 'ok' | 'err' | 'off'
  const tab=TABS.find(t=>t.id===activeTab);

  const readLocalAll=()=>{
    const loaded={};
    TABS.forEach(t=>{
      try{const r=localStorage.getItem(t.key);loaded[t.id]=r?JSON.parse(r):{};} catch(e){loaded[t.id]={};}
    });
    return loaded;
  };

  // Load from localStorage immediately, then pull from server
  useEffect(()=>{
    setAllOv(readLocalAll());
    if(!SYNC_ON)return;
    let cancelled=false;
    (async()=>{
      const server=await syncPull();
      if(cancelled)return;
      if(server===null){setSyncState('err');return;}
      const merged={};
      TABS.forEach(t=>{
        const online=server[t.id]||{};
        let local={};
        try{const r=localStorage.getItem(t.key);local=r?JSON.parse(r):{};}catch(e){}
        const nOnline=Object.keys(online).length, nLocal=Object.keys(local).length;
        // Fusion : union des deux, les données locales priment si plus complètes
        const result=nLocal>nOnline ? {...online,...local} : {...local,...online};
        try{localStorage.setItem(t.key,JSON.stringify(result));}catch(e){}
        merged[t.id]=result;
        // Si local avait plus de données → pousser la version fusionnée vers le serveur
        if(nLocal>nOnline&&nLocal>0) syncPush(t.id,result);
      });
      setAllOv(merged);
      window.dispatchEvent(new Event('sync-pulled'));
      setSyncState('ok');
    })();
    return()=>{cancelled=true;};
  },[]);

  // Listen for storage changes (when App persists)
  useEffect(()=>{
    const onStorage=()=>setAllOv(readLocalAll());
    window.addEventListener('storage-quart',onStorage);
    return()=>window.removeEventListener('storage-quart',onStorage);
  },[]);

  const bstyle={flex:1,padding:'16px 12px',borderRadius:'14px',border:'1px solid #23262e',background:'#141519',color:'#e2e8f0',fontFamily:"'Inter',sans-serif",fontSize:'1.15rem',fontWeight:600,cursor:'pointer',WebkitTapHighlightColor:'transparent',letterSpacing:'.01em'};
  const dotColor=syncState==='ok'?'#10b981':syncState==='sync'?'#f59e0b':syncState==='err'?'#ef4444':'#475569';
  const dotLabel=syncState==='ok'?'Sauvegardé':syncState==='sync'?'Synchro…':syncState==='err'?'Hors-ligne':'';

  return h(Fragment,null,
    // Barre haute (zone sûre Dynamic Island)
    h('div',{style:{background:'#0a0b0d',padding:'calc(8px + env(safe-area-inset-top)) 0 0'}},
      SYNC_ON&&h('div',{style:{display:'flex',alignItems:'center',justifyContent:'flex-end',gap:'6px',padding:'0 12px 8px'}},
        h('span',{style:{width:'7px',height:'7px',borderRadius:'50%',background:dotColor,flexShrink:0,transition:'background .2s'}}),
        h('span',{style:{fontSize:'.62rem',color:'#5b626e',fontWeight:500,letterSpacing:'.02em'}},dotLabel)
      ),
      h('div',{style:{display:'flex',gap:'10px',padding:'0 10px 10px'}},
        h('button',{style:bstyle,onClick:()=>setBilanM(true)},'Mensuel'),
        h('button',{style:bstyle,onClick:()=>setBilanA(true)},'Annuel')
      )
    ),
    h(App,{key:tab.key,storageKey:tab.key,agentId:tab.id,isPaga:tab.isPaga,tabLabel:tab.label,tabColor:tab.color,onViewChange:setView,onSynced:()=>setSyncState('ok'),onSyncing:()=>setSyncState('sync')}),
    // Barre des noms, juste sous le calendrier
    h('div',{style:{background:'#0a0b0d',padding:'4px 0 0'}},
      h('div',{className:'tabs'},
        TABS.map(t=>h('button',{
          key:t.id,
          className:'tab',
          style:activeTab===t.id
            ? {background:t.bg, borderColor:t.border, color:t.color}
            : {},
          onClick:()=>setActiveTab(t.id)
        },t.label))
      )
    ),
    bilanM&&h(BilanMensuel,{view,allOv,onClose:()=>setBilanM(false)}),
    bilanA&&h(BilanAnnuel,{view,allOv,onClose:()=>setBilanA(false)})
  );
}

function App({storageKey,agentId,isPaga,tabLabel,tabColor,onViewChange,onSynced,onSyncing}){
  const today=new Date();
  const [view,setView]=useState({y:today.getFullYear(),m:today.getMonth()});
  const [ov,setOv]=useState({});
  const [modal,setModal]=useState(null);
  const [picker,setPicker]=useState(false);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    setOv({});
    setLoaded(false);
    try{const r=localStorage.getItem(storageKey);if(r)setOv(JSON.parse(r));}catch(e){}
    setLoaded(true);
  },[storageKey]);

  // Reload this tab's data when an online pull completes
  useEffect(()=>{
    const onPulled=()=>{
      try{const r=localStorage.getItem(storageKey);setOv(r?JSON.parse(r):{});}catch(e){}
    };
    window.addEventListener('sync-pulled',onPulled);
    return()=>window.removeEventListener('sync-pulled',onPulled);
  },[storageKey]);

  // Notify Root of view changes for bilan context
  useEffect(()=>{if(onViewChange)onViewChange(view);},[view]);

  const persist=useCallback(next=>{
    setOv(next);
    try{localStorage.setItem(storageKey,JSON.stringify(next));window.dispatchEvent(new Event('storage-quart'));}catch(e){}
    if(SYNC_ON){
      if(onSyncing)onSyncing();
      syncPush(agentId,next).then(()=>{if(onSynced)onSynced();});
    }
  },[storageKey,agentId,onSyncing,onSynced]);

  const goPrev=()=>setView(v=>v.m===0?{y:v.y-1,m:11}:{y:v.y,m:v.m-1});
  const goNext=()=>setView(v=>v.m===11?{y:v.y+1,m:0}:{y:v.y,m:v.m+1});

  const tk=dkey(today);
  const first=new Date(view.y,view.m,1);
  const off=first.getDay()===0?6:first.getDay()-1;
  const cells=Array.from({length:Math.ceil((off+new Date(view.y,view.m+1,0).getDate())/7)*7},(_,i)=>addDays(addDays(first,-off),i));
  const allFeries=new Set([...getFeries(view.y-1),...getFeries(view.y),...getFeries(view.y+1)]);
  const month=calcMonth(view,ov,allFeries,agentId);
  const isc=month.isc,hs=month.hs,ind=month.ind,ca=month.ca;

  const open=d=>{if(d.getMonth()!==view.m||!agentPhase(agentId,d).active)return;setModal({date:d,shift:getEffShiftCode(d,agentId),meta:getEffShiftMeta(d,agentId)});};
  const save=(data,numDays)=>{
    const next={...ov};
    const nd=numDays||1;
    if(data===null){
      delete next[dkey(modal.date)];
    } else {
      for(let i=0;i<nd;i++){
        const dd=addDays(modal.date,i);
        next[dkey(dd)]={...data};
      }
    }
    persist(next);setModal(null);
  };

  if(!loaded)return h('div',{style:{background:'#0a0b0d',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'#374151'}},'···');

  return h('div',{className:'root'},
    h('div',{className:'hdr'},

    ),
    h('div',{className:'dow'},JOURS.map((j,i)=>h('div',{key:i,className:'dh'},j))),
    h('div',{className:'grid',style:{borderRadius:'8px',outline:'3px solid '+(tabColor||'#2563eb'),outlineOffset:'5px'}},
      cells.map((d,i)=>{
        const inM=d.getMonth()===view.m,key=dkey(d),o=ov[key];
        const ph=agentPhase(agentId,d);
        if(inM&&!ph.active){
          return h('div',{key:i,className:'cell',style:{opacity:.2,pointerEvents:'none',background:'#0c0d10',border:'1px solid rgba(255,255,255,0.03)'}},
            h('div',{className:'dn',style:{background:'#15171c',color:'#3a4150',boxShadow:'none'}},h('span',null,d.getDate()))
          );
        }
        const raw=getShift(d,agentId);

        const dow=d.getDay(),isWE=dow===0||dow===6;
        const cc='cell'+(!inM?' out':'')+(isToday?' today':'')+(isFerie&&inM?' ferie':isWE&&inM?' weekend':'');
        const theoAutoMeta=inM?getEffShiftMeta(d,agentId):SHIFT[raw]||SHIFT.RAH;
        const theoCode=(o&&o.manShift)||(inM?getEffShiftCode(d,agentId):raw);
        const theoMeta=(o&&o.manShift)?(SHIFT[o.manShift]||SHIFT.RAH):theoAutoMeta;

        const fsf=sh=>sh.length===1?'.82rem':sh.length===2?'.66rem':'.52rem';
        const chipLabel=theoCode==='APM'?'AM':theoCode==='E'?'J':theoCode==='E/'?'V':(theoCode==='M'||theoCode==='N')?theoMeta.short:null;

          inM&&isFerie&&h('div',{style:{position:'absolute',bottom:0,left:0,right:0,textAlign:'center',padding:'2px 0 3px',fontSize:'.6rem',fontWeight:800,letterSpacing:'.08em',borderRadius:'0 0 4px 4px',background:'#7f1d1d',color:'#fca5a5',zIndex:2}},'\ufe0fJF'),

    modal&&h(Modal,{modal,ov,onSave:save,onClose:()=>setModal(null),agentId}),

function BilanAgentDetail({detail,view,allF,fmt2,R,onClose}){
  const {label,isPaga,total,ca,tab,ov}=detail;
  const JOURS_ABR=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const SL={M:'Matin',APM:'Après-midi',N:'Nuit',E:'J','E/':'V'};

    const rows=[];
  const lastDay=new Date(view.y,view.m+1,0).getDate();
  for(let day=1;day<=lastDay;day++){
    const d=new Date(view.y,view.m,day);
    const key=dkey(d);
    const o=ov[key]||null;
    const dd=calcDay(d,ov,allF,tab.id);
    const tot=Math.round((dd.iscTh+dd.iscRe+dd.hs+dd.indRempl+dd.indFerie+dd.credit+dd.sup)*100)/100;
    if(tot<=0&&dd.ca<=0)continue;
    const theo=(o&&o.manShift)||getEffShiftCode(d,tab.id);
    const isFerie=allF.has(key);
    const dow=JOURS_ABR[d.getDay()];
    let desc,color;
    if(o&&(o.absent||o.absenceType)){
      const t=o.absent?'CA':o.absenceType;
      const lmap={CA:'Congé annuel',RC:'RC',MAL:'Maladie',HP:'HP'};
      desc='🏖️ '+(lmap[t]||t); color='#67e8f9';
    } else if(o&&o.repl){
      desc='🔄 Repl. '+(SL[o.repl]||o.repl); color='#c4b5fd';
    } else if(o&&o.event){
      const elmap={reunion:'👥 Réunion',cph:'⚖️ CPH',bj:'⚖️ BJ'};
      desc=elmap[o.event]||o.event; color='#86efac';
    } else {
      const eml={M:'🌅 Matin',APM:'🌆 Après-midi',N:'🌙 Nuit',E:'📋 J','E/':'📋 V'};
      desc=eml[theo]||theo; color='#94a3b8';
    }
    if(isFerie)desc+=' · JF';
    // Pour les absences, afficher les heures CA ; pour les autres, les heures générées
    const displayVal=dd.ca>0?dd.ca:tot;
    rows.push({day,dow,desc,color,tot,displayVal,isAbs:dd.ca>0});
  }
  const totalAbs=rows.filter(r=>r.isAbs).reduce((s,r)=>s+r.displayVal,0);

  return h('div',{className:'mbg',onClick:onClose},
    h('div',{className:'mcard',style:{maxHeight:'80dvh',overflowY:'auto'},onClick:e=>e.stopPropagation()},
      h('div',{className:'mhandle'}),
      h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'14px'}},
        h('div',{style:{width:'10px',height:'10px',borderRadius:'50%',background:tab.color,flexShrink:0}}),
        h('div',null,
          h('div',{style:{fontSize:'.6rem',color:'#64748b',letterSpacing:'.08em',textTransform:'uppercase'}},MOIS[view.m]+' '+view.y),
          h('div',{style:{fontSize:'1rem',fontWeight:700,color:'#f1f5f9'}},label)
        )
      ),
      rows.map(({day,dow,desc,color,displayVal,isAbs},i)=>
        h('div',{key:i,style:{display:'flex',alignItems:'center',gap:'10px',padding:'7px 0',borderBottom:'1px solid #1a1d27'}},
          h('div',{style:{width:'42px',flexShrink:0}},
            h('div',{style:{fontSize:'.62rem',fontWeight:700,color:'#475569'}},(dow)),
            h('div',{style:{fontSize:'.82rem',fontWeight:800,color:'#f1f5f9'}},day)
          ),
          h('div',{style:{flex:1,fontSize:'.75rem',color:color}},desc),
          h('div',{style:{fontSize:'.78rem',fontWeight:700,color:isAbs?'#fb923c':'#f1f5f9',whiteSpace:'nowrap'}},fmt2(displayVal)+' h')
        )
      ),
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'10px 0 2px',marginTop:'6px',borderTop:'2px solid #2d3139'}},
        h('span',{style:{fontSize:'.7rem',fontWeight:700,color:'#64748b',letterSpacing:'.08em',textTransform:'uppercase'}},'Total généré'),
        h('div',{style:{textAlign:'right'}},
          h('div',{style:{display:'flex',alignItems:'baseline',gap:'4px'}},
            h('span',{style:{fontSize:'1.4rem',fontWeight:800,color:'#f1f5f9'}},fmt2(total)),
            h('span',{style:{fontSize:'.7rem',color:'#64748b'}},'h')
          ),
          isPaga&&h('div',{style:{fontSize:'.65rem',color:'#475569'}},fmt2(total*R)+' €')
        )
      ),
      totalAbs>0&&h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'6px 0',borderTop:'1px solid #2d3139',marginTop:'2px'}},
        h('span',{style:{fontSize:'.7rem',fontWeight:700,color:'#fb923c',letterSpacing:'.06em',textTransform:'uppercase'}},'Absences'),
        h('div',{style:{display:'flex',alignItems:'baseline',gap:'4px'}},
          h('span',{style:{fontSize:'1rem',fontWeight:700,color:'#fb923c'}},fmt2(totalAbs)),
          h('span',{style:{fontSize:'.65rem',color:'#64748b'}},'h')
        )
      ),
      h('button',{className:'bcanc',style:{width:'100%',marginTop:'10px'},onClick:onClose},'Retour')
    )
  );
}


function BilanAnnuel({view,allOv,onClose}){
  const R=19.85;
  const fmt=v=>v.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const MOIS_ABR=["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
  const [selTab,setSelTab]=useState(TABS[0].id);
  const tab=TABS.find(t=>t.id===selTab);
  const ov=allOv[selTab]||{};
  const ann=calcAnnuel(view.y,ov,selTab);

  const ColH=({label,color,right})=>h('div',{style:{fontSize:'.52rem',fontWeight:700,color:color||'#475569',letterSpacing:'.1em',textTransform:'uppercase',textAlign:right?'right':'left'}},label);

  return h('div',{className:'mbg',onClick:onClose},
    h('div',{className:'mcard',style:{display:'flex',flexDirection:'column',maxHeight:'calc(100dvh - env(safe-area-inset-top) - 12px)'},onClick:e=>e.stopPropagation()},
      h('div',{className:'mhandle'}),
      // Header
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'16px',flexShrink:0}},
        h('div',null,
          h('div',{style:{fontSize:'.58rem',fontWeight:600,color:'#475569',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:'4px'}},String(view.y)),
          h('div',{style:{fontSize:'1.1rem',fontWeight:800,color:'#f1f5f9',letterSpacing:'-.02em'}},'Bilan annuel')
        ),
        h('div',{style:{textAlign:'right'}},
          h('div',{style:{display:'flex',alignItems:'baseline',gap:'3px',justifyContent:'flex-end'}},
            h('span',{style:{fontSize:'1.6rem',fontWeight:800,color:'#f1f5f9',letterSpacing:'-.02em'}},fmt(ann.total)),
            h('span',{style:{fontSize:'.68rem',color:'#475569'}},'h')
          ),
          tab.isPaga&&h('div',{style:{fontSize:'.62rem',color:'#4b5568',marginTop:'2px'}},fmt(ann.total*R)+' €')
        )
      ),
      // Agent tabs
      h('div',{style:{display:'flex',gap:'5px',marginBottom:'14px',flexShrink:0}},
        TABS.map(t=>h('button',{key:t.id,
          style:{flex:1,padding:'8px 2px',borderRadius:'8px',border:'1.5px solid',
            borderColor:selTab===t.id?t.border:'#1e2230',
            background:selTab===t.id?t.bg:'#0e0f12',
            color:selTab===t.id?t.color:'#374151',
            fontFamily:"'Inter',sans-serif",fontSize:'.68rem',fontWeight:700,cursor:'pointer',
            WebkitTapHighlightColor:'transparent',letterSpacing:'-.01em'},
          onClick:e=>{e.stopPropagation();setSelTab(t.id);}
        },t.label))
      ),
      // Column headers
      h('div',{style:{display:'grid',gridTemplateColumns:'3rem 1fr 1fr 1fr',gap:'4px',paddingBottom:'8px',borderBottom:'1px solid #1e2230',marginBottom:'2px',flexShrink:0}},
        h(ColH,{label:'Mois'}),
        h(ColH,{label:'Total',color:'#94a3b8',right:true}),
        h(ColH,{label:'ISC',color:'#64748b',right:true}),
        h(ColH,{label:'Abs',color:'#f97316',right:true})
      ),
      // Month rows
      h('div',{style:{overflowY:'auto',flex:1,WebkitOverflowScrolling:'touch'}},
        ann.months.map(({m,isc,hs,ca,total})=>{
          const isCur=m===view.m;
          const hasData=total>0||ca>0;
          return h('div',{key:m,style:{
            display:'grid',gridTemplateColumns:'3rem 1fr 1fr 1fr',gap:'4px',
            padding:isCur?'10px 8px':'7px 4px',
            borderRadius:isCur?'8px':'4px',
            background:isCur?tab.bg:'transparent',
            border:'1px solid '+(isCur?tab.border:'transparent'),
            marginBottom:'2px',
          }},
            h('span',{style:{fontSize:'.8rem',fontWeight:isCur?700:400,color:isCur?tab.color:hasData?'#94a3b8':'#374151',alignSelf:'center',letterSpacing:'-.01em'}},MOIS_ABR[m]),
            h('div',{style:{textAlign:'right',alignSelf:'center'}},
              h('span',{style:{fontSize:'.9rem',fontWeight:isCur?800:total>0?600:400,color:total>0?'#f1f5f9':'#2d3139',letterSpacing:'-.01em'}},total>0?fmt(total):'—')
            ),
            h('div',{style:{textAlign:'right',alignSelf:'center'}},
              h('span',{style:{fontSize:'.82rem',color:isc.total>0?'#64748b':'#1e2230'}},isc.total>0?fmt(isc.total):'—')
            ),
            h('div',{style:{textAlign:'right',alignSelf:'center'}},
              h('span',{style:{fontSize:'.82rem',color:ca>0?'#f97316':'#1e2230'}},ca>0?fmt(ca):'—')
            )
          );
        })
      ),
      // Total row
      h('div',{style:{display:'grid',gridTemplateColumns:'3rem 1fr 1fr 1fr',gap:'4px',paddingTop:'10px',borderTop:'1px solid #2d3139',marginTop:'4px',marginBottom:'14px',flexShrink:0}},
        h('span',{style:{fontSize:'.72rem',fontWeight:700,color:'#64748b',alignSelf:'center',letterSpacing:'.04em',textTransform:'uppercase'}},'Total'),
        h('div',{style:{textAlign:'right'}},
          h('div',{style:{display:'flex',alignItems:'baseline',gap:'2px',justifyContent:'flex-end'}},
            h('span',{style:{fontSize:'1rem',fontWeight:800,color:'#f1f5f9'}},fmt(ann.total)),
            h('span',{style:{fontSize:'.58rem',color:'#475569'}},'h')
          ),
          tab.isPaga&&h('div',{style:{fontSize:'.58rem',color:'#374151'}},fmt(ann.total*R)+'€')
        ),
        h('div',{style:{textAlign:'right',alignSelf:'center'}},
          h('span',{style:{fontSize:'.88rem',fontWeight:600,color:'#64748b'}},fmt(ann.isc.total))
        ),
        h('div',{style:{textAlign:'right',alignSelf:'center'}},
          ann.ca>0&&h('span',{style:{fontSize:'.88rem',fontWeight:600,color:'#f97316'}},fmt(ann.ca))
        )
      ),
      h('button',{className:'bcanc',style:{width:'100%',flexShrink:0},onClick:onClose},'Fermer')
    )
  );
}

function HsDetail({hs,view,onClose}){
  const R=19.85;
  const fmt2=v=>v.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2});
  return h('div',{className:'mbg',onClick:onClose},
    h('div',{className:'mcard',onClick:e=>e.stopPropagation()},
      h('div',{className:'mhandle'}),
      h('div',{className:'mhead'},
        h('div',null,
          h('div',{className:'mdate'},MOIS[view.m]+' '+view.y),
          h('div',{className:'mshift'},'Heures supplémentaires')
        )
      ),
      h('div',{className:'detail-total',style:{marginTop:0}},
        h('div',null,
          h('div',{style:{fontSize:'.6rem',color:'#475569',letterSpacing:'.06em',textTransform:'uppercase'}},'Total remplacements'),
          h('div',{style:{fontSize:'.75rem',color:'#374151',marginTop:'4px'}},fmt2(hs*R)+' €')
        ),
        h('div',{style:{textAlign:'right'}},
          h('div',{style:{display:'flex',alignItems:'baseline',gap:'4px',justifyContent:'flex-end'}},
            h('span',{style:{fontSize:'1.3rem',fontWeight:700,color:'#f1f5f9'}},fmt2(hs)),
            h('span',{style:{fontSize:'.7rem',color:'#6b7280'}},'h')
          )
        )
      ),
      h('div',{className:'mact'},
        h('button',{className:'bcanc',style:{width:'100%'},onClick:onClose},'Fermer')
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(Root,null));
</script>
</body>
</html>
